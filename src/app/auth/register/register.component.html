<div class="auth-card">
  <h1>Create Account</h1>
  <p class="subtitle">Fill in your details to register</p>

  @if (errorMsg()) {
    <div class="error-banner">{{ errorMsg() }}</div>
  }

  <form [formGroup]="formRef" (ngSubmit)="submit()">
    <div class="row">
      <label>
        First Name
        <input type="text" formControlName="firstName" autocomplete="given-name" />
      </label>
      <label>
        Last Name
        <input type="text" formControlName="lastName" autocomplete="family-name" />
      </label>
    </div>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label>
      Password
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>

    <label>
      Confirm Password
      <input type="password" formControlName="confirmPassword" autocomplete="new-password" />
    </label>

    @if (formRef.hasError('passwordMismatch')) {
      <p class="field-error">Passwords do not match.</p>
    }

    <button type="submit" class="btn-primary">Create Account</button>
  </form>

  <p class="footer-text">
    Already have an account? <a routerLink="/login">Sign In</a>
  </p>
</div>
