<sdk-table [store]="store">
  <ng-template #header let-onAdd="onAdd">
    <h2>Post (fake api)</h2>
    <button type="button" (click)="onAdd()">Add Post</button>
  </ng-template>
  <ng-template #headerColumns>
    <th>postID</th>
    <th>id</th>
    <th>Title</th>
    <th>Body</th>
    <th></th>
  </ng-template>

  <ng-template #row let-post let-onEdit="onEdit" let-onDelete="onDelete">
    <tr>
      <td>{{ post.id }}</td>

      <td>{{ post.title }}</td>
      <td>{{ post.body }}</td>
      <td></td>
      <td class="actions-cell">
        <button class="btn-edit" type="button" (click)="onEdit(post)">Edit</button>
        <button class="btn-delete" type="button" (click)="onDelete(post.id)">Delete</button>
      </td>
    </tr>
  </ng-template>
</sdk-table>
