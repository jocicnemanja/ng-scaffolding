<kim-table [store]="store">
  <ng-template #header>
    <h2>Post (fake api)</h2>
    <button>Add Post</button>
  </ng-template>
  <ng-template #headerColumns>
    <th>postID</th>
    <th>id</th>
    <th>Title</th>
    <th>Body</th>
    <th></th>
  </ng-template>

  <ng-template #row let-post>
    <tr>
      <td>{{ post.id }}</td>

      <td>{{ post.title }}</td>
      <td>{{ post.body }}</td>
      <td></td>
      <td class="actions-cell">
        <button class="btn-edit" type="button">Edit</button>
        <button class="btn-delete" type="button">Delete</button>
      </td>
    </tr>
  </ng-template>
</kim-table>
