@if (open()) {
  <div class="sdk-drawer__backdrop" (click)="onBackdropClick($event)">
    <aside
      class="sdk-drawer__panel"
      [class.sdk-drawer__panel--left]="side() === 'left'"
      [class.sdk-drawer__panel--right]="side() === 'right'"
      role="document"
    >
      <header class="sdk-drawer__header">
        <h2 class="sdk-drawer__title">{{ title() }}</h2>
        @if (closable()) {
          <button
            type="button"
            class="sdk-drawer__close"
            aria-label="Close drawer"
            (click)="onClose()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        }
      </header>

      <div class="sdk-drawer__body">
        <ng-content />
      </div>
    </aside>
  </div>
}
